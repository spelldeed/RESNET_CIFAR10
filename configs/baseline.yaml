exp_name: baseline
seed: 42

dataset:
  name: cifar10
  root: ./data
  num_classes: 10

dataloader:
  batch_size: 128
  num_workers: 2

model:
  name: resnet18
  num_classes: 10

training:
  epochs: 200
  device: auto

optimizer:
  name: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0001

scheduler:
  name: cosine

logging:
  save_best: true
  save_last: true

